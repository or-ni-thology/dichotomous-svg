<!-- ════ OVA EGG ENGINE (ported, vanilla) — lays the masthead egg-O ════
     The estate's egg engine, lifted faithfully from OVA·TRANSMISSOR:
     a Hügelschäffer shell, a mulberry32 freckle-scatter crowded to the
     broad pole. The O of the wordmark is not a letter — it is a nest,
     and a fresh snipe egg is laid into it on every page load. Quid ni? -->
<script>
var OVA=(function(){
  var FAINT="#6b5d49";
  function mulberry32(a){return function(){a|=0;a=(a+0x6d2b79f5)|0;var t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
  function lerp(a,b,t){return a+(b-a)*t;}
  function hexToRgb(h){var n=parseInt(h.slice(1),16);return[(n>>16)&255,(n>>8)&255,n&255];}
  function rgbToHex(r,g,b){function c(x){return Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,"0");}return"#"+c(r)+c(g)+c(b);}
  function mixHex(h1,h2,t){var a=hexToRgb(h1),b=hexToRgb(h2);return rgbToHex(lerp(a[0],b[0],t),lerp(a[1],b[1],t),lerp(a[2],b[2],t));}
  var CAT={ snipe:{len:39,wid:28,d:0.175,ground:"#8f8a52",shade:"#6f6a3c",blot:"#3d2516",grey:"#9a9180",density:40,capward:0.92,coarse:0.75} };
  function eggPath(cx,cy,hl,hw,d,n){n=n||140;var p=[];for(var i=0;i<=n;i++){var t=(i/n)*Math.PI*2,ex=Math.cos(t),ey=Math.sin(t)*Math.exp(-d*Math.cos(t));p.push([cx+ey*hw,cy+ex*hl]);}return "M "+p.map(function(q){return q[0].toFixed(2)+","+q[1].toFixed(2);}).join(" ")+" Z";}
  function polyPoints(cx,cy,hl,hw,d,n){n=n||90;var p=[];for(var i=0;i<=n;i++){var t=(i/n)*Math.PI*2,ex=Math.cos(t),ey=Math.sin(t)*Math.exp(-d*Math.cos(t));p.push([cx+ey*hw,cy+ex*hl]);}return p;}
  function inPoly(px,py,poly){var c=false;for(var i=0,j=poly.length-1;i<poly.length;j=i++){var xi=poly[i][0],yi=poly[i][1],xj=poly[j][0],yj=poly[j][1];if(((yi>py)!==(yj>py))&&(px<((xj-xi)*(py-yi))/(yj-yi)+xi))c=!c;}return c;}
  function speckles(m,seed,cx,cy,hl,hw){
    var rng=mulberry32((seed^Math.round(m.d*1000)^(m.len<<3))>>>0);
    var poly=polyPoints(cx,cy,hl,hw,m.d),top=cy-hl,bot=cy+hl,left=cx-hw,right=cx+hw;
    var deep=[],faint=[],pepper=[],tBig=Math.round(m.density*0.55),tSm=Math.round(m.density*1.5),tries=0;
    while(deep.length+faint.length<tBig&&tries<5000){tries++;var qx=lerp(left,right,rng()),qy=lerp(top,bot,rng());if(!inPoly(qx,qy,poly))continue;var fr=(qy-top)/(bot-top);var ac=Math.pow(1-fr,lerp(0.6,2.4,m.capward))+0.1;if(rng()>ac)continue;var sb=lerp(2.4,9.5,m.coarse)*(0.55+0.6*(1-fr));var r0=sb*lerp(0.6,1.25,rng());var rx=r0*lerp(0.8,1.35,rng()),ry=r0*lerp(0.6,1.0,rng()),rot=rng()*180;(rng()<0.6?deep:faint).push([qx,qy,rx,ry,rot]);}
    tries=0;
    while(pepper.length<tSm&&tries<7000){tries++;var qx2=lerp(left,right,rng()),qy2=lerp(top,bot,rng());if(!inPoly(qx2,qy2,poly))continue;var fr2=(qy2-top)/(bot-top);var ac2=Math.pow(1-fr2,lerp(0.4,1.6,m.capward))+0.22;if(rng()>ac2)continue;pepper.push([qx2,qy2,lerp(0.6,2.0,rng())]);}
    return {deep:deep,faint:faint,pepper:pepper};
  }
  function svg(species,seed,opts){
    opts=opts||{};var m=CAT[species]||CAT.snipe;var ppm=opts.pxPerMm||2.5;
    var hl=(m.len/2)*ppm,hw=(m.wid/2)*ppm,pad=opts.pad!=null?opts.pad:hw*0.18+2;
    var cx=hw+pad,cy=hl+pad,W=(hw+pad)*2,H=(hl+pad)*2;
    var path=eggPath(cx,cy,hl,hw,m.d),sp=speckles(m,seed>>>0,cx,cy,hl,hw),top=cy-hl,bot=cy+hl;
    var uid=(opts.id||(species+seed)).replace(/[^a-z0-9]/gi,""),grad="shell_"+uid,clip="clip_"+uid,rim=opts.rim!=null?opts.rim:1.4;
    var s='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+W.toFixed(1)+' '+H.toFixed(1)+'"';
    if(opts.width)s+=' width="'+opts.width+'" height="'+(opts.width*H/W).toFixed(1)+'"';
    s+='>';
    s+='<defs><radialGradient id="'+grad+'" cx="42%" cy="32%" r="78%"><stop offset="0%" stop-color="'+mixHex(m.ground,"#ffffff",0.35)+'"/><stop offset="55%" stop-color="'+m.ground+'"/><stop offset="100%" stop-color="'+m.shade+'"/></radialGradient><clipPath id="'+clip+'"><path d="'+path+'"/></clipPath></defs>';
    s+='<path d="'+path+'" fill="url(#'+grad+')" stroke="'+FAINT+'" stroke-width="'+rim+'" opacity="0.97"/>';
    s+='<g clip-path="url(#'+clip+')">';
    sp.faint.forEach(function(b){s+='<ellipse cx="'+b[0].toFixed(2)+'" cy="'+b[1].toFixed(2)+'" rx="'+b[2].toFixed(2)+'" ry="'+b[3].toFixed(2)+'" transform="rotate('+b[4].toFixed(1)+' '+b[0].toFixed(2)+' '+b[1].toFixed(2)+')" fill="'+m.grey+'" opacity="0.42"/>';});
    sp.deep.forEach(function(b){s+='<ellipse cx="'+b[0].toFixed(2)+'" cy="'+b[1].toFixed(2)+'" rx="'+b[2].toFixed(2)+'" ry="'+b[3].toFixed(2)+'" transform="rotate('+b[4].toFixed(1)+' '+b[0].toFixed(2)+' '+b[1].toFixed(2)+')" fill="'+m.blot+'" opacity="0.62"/>';});
    sp.pepper.forEach(function(b){s+='<circle cx="'+b[0].toFixed(2)+'" cy="'+b[1].toFixed(2)+'" r="'+b[2].toFixed(2)+'" fill="'+m.blot+'" opacity="0.4"/>';});
    s+='<ellipse cx="'+cx.toFixed(2)+'" cy="'+bot.toFixed(2)+'" rx="'+(hw*1.05).toFixed(2)+'" ry="'+(hl*0.5).toFixed(2)+'" fill="'+m.shade+'" opacity="0.14"/>';
    s+='<ellipse cx="'+(cx-hw*0.32).toFixed(2)+'" cy="'+(top+hl*0.5).toFixed(2)+'" rx="'+(hw*0.28).toFixed(2)+'" ry="'+(hl*0.26).toFixed(2)+'" fill="#fffaf0" opacity="0.22"/>';
    s+='</g>';
    s+='<path d="'+path+'" fill="none" stroke="'+FAINT+'" stroke-width="'+rim+'" opacity="0.55"/>';
    s+='</svg>';
    return s;
  }
  /* djb2 — turn any string (an EGG code, a coordinate) into a seed */
  function seedFrom(str){var h=5381;str=String(str);for(var i=0;i<str.length;i++){h=((h<<5)+h+str.charCodeAt(i))>>>0;}return h>>>0;}
  return { svg:svg, seedFrom:seedFrom };
})();
var MAST_EGG  = OVA.svg("snipe", (Math.random() * 4294967296) >>> 0, { pad: 3, id: "mastA" });
var MAST_EGG2 = OVA.svg("snipe", (Math.random() * 4294967296) >>> 0, { pad: 3, id: "mastB" });
</script>

<script>
(function(){
  var last=0;
  function measure(){
    var root=document.getElementById("scolo-root");
    return root?Math.ceil(root.getBoundingClientRect().height):document.body.scrollHeight;
  }
  function postH(){
    var h=measure();
    if(h&&Math.abs(h-last)>1){last=h;
      if(window.parent)window.parent.postMessage({eggFrame:true,id:"scolo-root",height:h},"*");}
  }
  window.addEventListener("load",function(){postH();setTimeout(postH,300);setTimeout(postH,1200);});
  if(window.ResizeObserver){var ro=new ResizeObserver(postH);window.addEventListener("load",function(){var r=document.getElementById("scolo-root");if(r)ro.observe(r);});}
  document.addEventListener("click",function(){setTimeout(postH,200);setTimeout(postH,600);});
})();
</script>
